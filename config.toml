theme = "moonfly"

[editor]
line-number = "relative"
mouse = false
clipboard-provider = "x-clip"
auto-pairs = false

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.whitespace.render]
space = "all"
tab = "none"
nbsp = "none"
nnbsp = "none"
newline = "none"

[editor.whitespace.characters]
space = "·"

[keys.normal]
"{" = ["goto_prev_paragraph"]
"}" = ["goto_next_paragraph"]
esc = ["collapse_selection", "keep_primary_selection"]
";" = "repeat_last_motion"
X = ["extend_line_above", "extend_to_line_bounds"]

[keys.select]
";" = "repeat_last_motion"

[editor.gutters]
layout = ["diagnostics", "spacer", "line-numbers", "spacer"]
